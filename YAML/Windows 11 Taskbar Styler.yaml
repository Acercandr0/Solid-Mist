theme: ''
styleConstants:
  - bg=<WindhawkBlur BlurAmount="15" TintColor="{ThemeResource SystemChromeLowColor}" TintOpacity="0.5" />
  - bg2=<WindhawkBlur BlurAmount="7" TintColor="{ThemeResource SystemChromeLowColor}" TintOpacity="0.5" />
  - bgx=<WindhawkBlur BlurAmount="7" TintColor="{ThemeResource SystemChromeLowColor}" TintOpacity="0.3" />
  - border=<LinearGradientBrush StartPoint="0,0" EndPoint="0,1" Opacity="0.15"><GradientStop Color="{ThemeResource TextFillColorSecondary}" Offset="0.0"/><GradientStop Color="{ThemeResource TextFillColorTertiary}" Offset="0.5"/><GradientStop Color="{ThemeResource TextFillColorSecondary}" Offset="1.0"/></LinearGradientBrush>
  - StartIcon=<Viewbox Stretch="Uniform"><PathIcon Data="F1 M 1.8 0 H 12 V 12 H 0 V 1.8 A 1.8 1.8 0 0 1 1.8 0 Z M 13 0 H 23.2 A 1.8 1.8 0 0 1 25 1.8 V 12 H 13 Z M 0 13 H 12 V 25 H 1.8 A 1.8 1.8 0 0 1 0 23.2 V 13 Z M 13 13 H 25 V 23.2 A 1.8 1.8 0 0 1 23.2 25 H 13 Z"><PathIcon.Foreground><LinearGradientBrush StartPoint="1,1" EndPoint="0,0"><GradientStop Color="{ThemeResource SystemAccentColorLight1}" Offset="0"/><GradientStop Color="{ThemeResource SystemAccentColorLight3}" Offset="1"/></LinearGradientBrush></PathIcon.Foreground></PathIcon></Viewbox>
  - PressedIcon=<Viewbox Stretch="Uniform"><PathIcon Data="F1 M 1.8 0 H 12 V 12 H 0 V 1.8 A 1.8 1.8 0 0 1 1.8 0 Z M 13 0 H 23.2 A 1.8 1.8 0 0 1 25 1.8 V 12 H 13 Z M 0 13 H 12 V 25 H 1.8 A 1.8 1.8 0 0 1 0 23.2 V 13 Z M 13 13 H 25 V 23.2 A 1.8 1.8 0 0 1 23.2 25 H 13 Z"><PathIcon.Foreground><LinearGradientBrush StartPoint="1,1" EndPoint="0,0"><GradientStop Color="{ThemeResource TextFillColorSecondary}" Offset="0"/><GradientStop Color="{ThemeResource TextFillColorPrimary}" Offset="1"/></LinearGradientBrush></PathIcon.Foreground></PathIcon></Viewbox>
  - r=10
  - r2=7
controlStyles:
  - target: Taskbar.TaskListLabeledButtonPanel@RunningIndicatorStates > Rectangle#RunningIndicator
    styles:
      - Fill@ActiveRunningIndicator:=<SolidColorBrush Color="{ThemeResource SystemAccentColorLight2}" Opacity="1" />
      - Fill@InactiveRunningIndicator:=<SolidColorBrush Color="{ThemeResource SystemAccentColorLight3}" Opacity="1"/>
      - Height@InactiveRunningIndicator=2.5
      - Height@ActiveRunningIndicator=2
      - Width@InactiveRunningIndicator=2.5
      - Width@ActiveRunningIndicator=22
      - Opacity@RequestingAttentionRunningIndicator=0
      - Margin=0,0,0,-0.5
  - target: Windows.UI.Xaml.Shapes.Rectangle#ProgressBarTrack
    styles:
      - Fill:=<SolidColorBrush Color="{ThemeResource SystemAccentColor}" Opacity="0.5" />
      - Margin=0
  - target: Microsoft.UI.Xaml.Controls.ProgressBar#ProgressIndicator
    styles:
      - MaxWidth=22
      - Margin=0,0,0,-0.5
      - MinHeight=2
      - BorderThickness=0
  - target: Grid#RootGrid > Taskbar.TaskbarBackground > Grid > Rectangle#BackgroundFill
    styles:
      - Fill:=$bg
  - target: Rectangle#BackgroundStroke
    styles:
      - Height=0.5
  - target: Image#OverlayIcon
    styles:
      - RenderTransform:=<ScaleTransform ScaleX="0.8" ScaleY="0.8" />
      - Margin=12,-1,0,0
      - Canvas.ZIndex=1
  - target: Taskbar.Badge#BadgeControl
    styles:
      - RenderTransform:=<ScaleTransform ScaleX="0.8" ScaleY="0.8" />
      - Margin=12,-1,0,0
      - Canvas.ZIndex=1
  - target: MenuFlyoutPresenter > Border
    styles:
      - Background:=$bg
      - Shadow:=
      - BorderThickness=1
      - BorderBrush:=$border
      - CornerRadius=$r
  - target: MenuFlyoutPresenter
    styles:
      - Shadow:=
      - CornerRadius=$r
  - target: Border#OverflowFlyoutBackgroundBorder
    styles:
      - Background:=$bg
      - Shadow:=
      - BorderThickness=1
      - BorderBrush:=$border
      - CornerRadius=$r
  - target: Grid#ModalRootGrid > Border#BackgroundElement
    styles:
      - Shadow:=
      - CornerRadius=50
      - BorderBrush:=$border
      - Background:=$bg
  - target: Windows.UI.Xaml.Controls.Border#HoverFlyoutBackground
    styles:
      - Shadow:=
      - BorderThickness=1
      - BorderBrush:=$border
      - CornerRadius=$r
  - target: Windows.UI.Xaml.Controls.Border#HoverFlyoutBackground > Taskbar.TaskbarBackground#HoverFlyoutBackgroundControl > Windows.UI.Xaml.Controls.Grid > Windows.UI.Xaml.Shapes.Rectangle#BackgroundFill
    styles:
      - Fill:=$bg
  - target: Windows.UI.Xaml.Controls.ToolTip > Windows.UI.Xaml.Controls.ContentPresenter#LayoutRoot
    styles:
      - BorderBrush:=$border
      - Shadow:=
      - Background:=$bgx
      - CornerRadius=$r2
  - target: Windows.UI.Xaml.Controls.Border#BackgroundDimmingLayer
    styles:
      - Background:=$bg
  - target: Border#SnapBarBorder
    styles:
      - Background:=$bg2
      - Shadow:=
      - BorderThickness=1
      - BorderBrush:=$border
      - CornerRadius=$r
  - target: Border#SnapPickerBorder
    styles:
      - Background:=$bg2
      - Shadow:=
      - BorderThickness=1
      - BorderBrush:=$border
      - CornerRadius=$r
  - target: TextBlock#InnerTextBlock[Text=]
    styles:
      - Text=
  - target: WindowsInternal.ComposableShell.Experiences.Switcher.VirtualDesktopBarElement#VirtualDesktopBar > Grid#GridElement > Border#VirtualDesktopBarBackground
    styles:
      - Visibility=1
  - target: Grid#ConfirmatorMainGrid
    styles:
      - Background:=$bg2
      - Shadow:=
      - BorderThickness=1
      - BorderBrush:=$border
      - CornerRadius=22
  - target: Grid#HorizontalTemplate > Rectangle#HorizontalTrackRect
    styles:
      - Opacity=0.3
  - target: Taskbar.TaskListButtonPanel#ExperienceToggleButtonRootPanel > Border#BackgroundElement
    styles:
      - BorderThickness=0
  - target: Taskbar.TaskListButton#TaskListButton > Taskbar.TaskListLabeledButtonPanel#IconPanel > Border#BackgroundElement
    styles:
      - BorderThickness=0
  - target: SystemTray.OmniButton#ControlCenterButton > Grid > Border#BackgroundBorder
    styles:
      - BorderThickness=0
  - target: SystemTray.NotifyIconView#NotifyItemIcon > Grid#ContainerGrid > Border#BackgroundBorder
    styles:
      - BorderThickness=0
  - target: SystemTray.OmniButton#ControlCenterButton > Grid > Border#BackgroundBorder
    styles:
      - BorderThickness=0
  - target: SystemTray.ChevronIconView > Grid#ContainerGrid > Border#BackgroundBorder
    styles:
      - BorderThickness=0
  - target: SystemTray.OmniButton#ControlCenterButton
    styles:
      - BorderThickness=0
  - target: SystemTray.OmniButton#NotificationCenterButton
    styles:
      - BorderThickness=0
  - target: SystemTray.NotifyIconView > Grid#ContainerGrid > Border#BackgroundBorder
    styles:
      - BorderThickness=0
  - target: SystemTray.IconView#SystemTrayIcon > Grid#ContainerGrid > Border#BackgroundBorder
    styles:
      - BorderThickness=0
  - target: Taskbar.ExperienceToggleButton#LaunchListButton[AutomationProperties.AutomationId=StartButton] > Taskbar.TaskListButtonPanel > Microsoft.UI.Xaml.Controls.AnimatedVisualPlayer#Icon
    styles:
      - Visibility=1
  - target: Taskbar.ExperienceToggleButton#LaunchListButton[AutomationProperties.AutomationId=StartButton] > Taskbar.TaskListButtonPanel@CommonStates > Windows.UI.Xaml.Controls.ContentPresenter#CustomInjectedPresenter
    styles:
      - Content@InactivePointerOver:=$PressedIcon
      - Content@ActivePressed:=$PressedIcon
      - Content@ActivePointerOver:=$PressedIcon
      - Content@InactivePressed:=$PressedIcon
      - Content@InactiveNormal:=$StartIcon
      - Content@ActiveNormal:=$StartIcon
      - ContentTransitions@ActiveNormal:=<TransitionCollection><EntranceThemeTransition FromHorizontalOffset="0" FromVerticalOffset="0" IsStaggeringEnabled="False" /></TransitionCollection>
      - Margin=7,7,6,6
  - target: 'Taskbar.TaskListButton[AutomationProperties.AutomationId=Appid: com.squirrel.TIDAL.TIDAL] > Taskbar.TaskListLabeledButtonPanel#IconPanel > Windows.UI.Xaml.Controls.Image#Icon'
    styles:
      - Source=file:///C:/Customization/Icons/Apps/Tidal.png
themeResourceVariables:
  - ''
xamlDiagnosticsHandling: ''
